name: security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: dependency-review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  codeql:
    name: codeql
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python,javascript
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:multi'

  python-dependency-audit:
    name: python-dependency-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pip-audit
        run: python -m pip install pip-audit

      - name: Audit Python dependencies (advisory)
        run: |
          set +e
          pip-audit -r requirements.txt --format json --output pip-audit.json
          status=$?
          set -e
          if [ $status -ne 0 ]; then
            echo "::warning::pip-audit found vulnerabilities (advisory mode)."
          fi
          if [ ! -f pip-audit.json ]; then
            echo '{"dependencies": [], "vulnerabilities": []}' > pip-audit.json
          fi

      - name: Upload Python audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-audit-report
          path: pip-audit.json
          retention-days: 7

  npm-dependency-audit:
    name: npm-dependency-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: gui/frontend
        run: npm ci

      - name: Audit npm dependencies (advisory)
        working-directory: gui/frontend
        run: |
          set +e
          npm audit --audit-level=high --json > npm-audit.json
          status=$?
          set -e
          if [ $status -ne 0 ]; then
            echo "::warning::npm audit found vulnerabilities (advisory mode)."
          fi
          if [ ! -f npm-audit.json ]; then
            echo '{"metadata": {"vulnerabilities": {"info": 0, "low": 0, "moderate": 0, "high": 0, "critical": 0, "total": 0}}}' > npm-audit.json
          fi

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: gui/frontend/npm-audit.json
          retention-days: 7

  security-advisory-summary:
    name: security-advisory-summary
    runs-on: ubuntu-latest
    needs: [python-dependency-audit, npm-dependency-audit]
    if: always()
    steps:
      - name: Download Python audit artifact
        uses: actions/download-artifact@v4
        with:
          name: python-audit-report
          path: security-reports

      - name: Download npm audit artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-audit-report
          path: security-reports

      - name: Publish security advisory summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('security-reports')
          pip_path = root / 'pip-audit.json'
          npm_path = root / 'npm-audit.json'

          pip_vuln_count = 0
          npm_counts = {'info': 0, 'low': 0, 'moderate': 0, 'high': 0, 'critical': 0, 'total': 0}

          if pip_path.exists():
            try:
              pip_data = json.loads(pip_path.read_text(encoding='utf-8'))
              if isinstance(pip_data, list):
                pip_vuln_count = len(pip_data)
              elif isinstance(pip_data, dict):
                vulns = pip_data.get('vulnerabilities')
                if isinstance(vulns, list):
                  pip_vuln_count = len(vulns)
            except Exception:
              pip_vuln_count = 0

          if npm_path.exists():
            try:
              npm_data = json.loads(npm_path.read_text(encoding='utf-8'))
              values = npm_data.get('metadata', {}).get('vulnerabilities', {})
              if isinstance(values, dict):
                for key in npm_counts:
                  npm_counts[key] = int(values.get(key, 0))
            except Exception:
              pass

          summary = Path(__import__('os').environ['GITHUB_STEP_SUMMARY'])
          with summary.open('a', encoding='utf-8') as fh:
            fh.write('## Security Advisory Summary\n\n')
            fh.write('- Python (`pip-audit`) findings: ' + str(pip_vuln_count) + '\n')
            fh.write(
              '- npm (`npm audit`) findings: '
              + 'critical=' + str(npm_counts['critical'])
              + ', high=' + str(npm_counts['high'])
              + ', moderate=' + str(npm_counts['moderate'])
              + ', low=' + str(npm_counts['low'])
              + ', info=' + str(npm_counts['info'])
              + ', total=' + str(npm_counts['total'])
              + '\n'
            )
            fh.write('- Mode: advisory (does not fail workflow on vulnerability findings).\n')
          PY

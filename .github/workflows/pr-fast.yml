name: pr-fast

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-fast-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      openapi: ${{ steps.filter.outputs.openapi }}
    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            frontend:
              - 'gui/frontend/**'
            backend:
              - 'lectern/**'
              - 'gui/backend/**'
              - 'tests/**'
              - 'requirements.txt'
              - 'pytest.ini'
            openapi:
              - 'lectern/**'
              - 'gui/backend/**'
              - 'gui/frontend/src/generated/**'
              - 'gui/frontend/package.json'
              - 'gui/frontend/package-lock.json'

  frontend-quality:
    name: frontend-quality
    runs-on: ubuntu-latest
    needs: detect-changes
    if: always()
    steps:
      - uses: actions/checkout@v6
        if: needs.detect-changes.outputs.frontend == 'true'

      - name: Setup Node.js
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install dependencies
        if: needs.detect-changes.outputs.frontend == 'true'
        working-directory: gui/frontend
        run: npm ci

      - name: Lint
        if: needs.detect-changes.outputs.frontend == 'true'
        working-directory: gui/frontend
        run: npm run lint

      - name: Typecheck
        if: needs.detect-changes.outputs.frontend == 'true'
        working-directory: gui/frontend
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Unit tests
        if: needs.detect-changes.outputs.frontend == 'true'
        working-directory: gui/frontend
        run: npm test -- --run

      - name: Frontend unchanged
        if: needs.detect-changes.outputs.frontend != 'true'
        run: echo "Frontend unchanged; skipping frontend-quality checks."

  backend-quality:
    name: backend-quality
    runs-on: ubuntu-latest
    needs: detect-changes
    if: always()
    steps:
      - uses: actions/checkout@v6
        if: needs.detect-changes.outputs.backend == 'true'

      - name: Setup Python
        if: needs.detect-changes.outputs.backend == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: needs.detect-changes.outputs.backend == 'true'
        run: python -m pip install -r requirements.txt

      - name: Backend tests
        if: needs.detect-changes.outputs.backend == 'true'
        run: pytest tests/ -q

      - name: Backend unchanged
        if: needs.detect-changes.outputs.backend != 'true'
        run: echo "Backend unchanged; skipping backend-quality checks."

  openapi-sync:
    name: openapi-sync
    runs-on: ubuntu-latest
    needs: detect-changes
    if: always()
    steps:
      - uses: actions/checkout@v6
        if: needs.detect-changes.outputs.openapi == 'true'

      - name: Setup Node.js
        if: needs.detect-changes.outputs.openapi == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Setup Python
        if: needs.detect-changes.outputs.openapi == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        if: needs.detect-changes.outputs.openapi == 'true'
        run: python -m pip install -r requirements.txt

      - name: Install frontend dependencies
        if: needs.detect-changes.outputs.openapi == 'true'
        working-directory: gui/frontend
        run: npm ci

      - name: Start backend
        if: needs.detect-changes.outputs.openapi == 'true'
        run: |
          uvicorn gui.backend.main:app --port 8000 --host 127.0.0.1 > backend.log 2>&1 &
          python - <<'PY'
          import time
          import urllib.request
          url = 'http://127.0.0.1:8000/health'
          last_err = None
          for _ in range(80):
              try:
                  with urllib.request.urlopen(url, timeout=1) as response:
                      if response.status == 200:
                          raise SystemExit(0)
              except Exception as exc:
                  last_err = exc
                  time.sleep(0.25)
          raise SystemExit(f'backend not ready: {last_err}')
          PY

      - name: Verify OpenAPI client sync
        if: needs.detect-changes.outputs.openapi == 'true'
        working-directory: gui/frontend
        run: |
          npm run generate-api
          if ! git diff --exit-code -- src/generated/api.ts; then
            echo '::error::OpenAPI client drift detected. Run npm run generate-api locally and commit.'
            exit 1
          fi

      - name: OpenAPI unchanged
        if: needs.detect-changes.outputs.openapi != 'true'
        run: echo "OpenAPI surfaces unchanged; skipping openapi-sync check body."

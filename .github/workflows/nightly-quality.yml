name: nightly-quality

on:
  schedule:
    - cron: '11 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-quality-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deep-e2e:
    name: deep-e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: gui/frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: gui/frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        run: |
          uvicorn gui.backend.main:app --port 8000 --host 127.0.0.1 > backend.log 2>&1 &
          python - <<'PY'
          import time
          import urllib.request
          url = 'http://127.0.0.1:8000/health'
          for _ in range(100):
              try:
                  with urllib.request.urlopen(url, timeout=1) as response:
                      if response.status == 200:
                          raise SystemExit(0)
              except Exception:
                  time.sleep(0.25)
          raise SystemExit('backend not ready')
          PY

      - name: Start frontend
        working-directory: gui/frontend
        env:
          VITE_API_URL: http://127.0.0.1:8000
        run: |
          npm run dev -- --host 127.0.0.1 --port 5173 > ../frontend.log 2>&1 &
          node -e "const http=require('http'); const start=Date.now(); const timeoutMs=20000; const tick=()=>{http.get('http://127.0.0.1:5173',()=>process.exit(0)).on('error',()=>{if(Date.now()-start>timeoutMs){console.error('frontend not ready');process.exit(1);}setTimeout(tick,300);});}; tick();"

      - name: Run full E2E suite
        working-directory: gui/frontend
        env:
          CI: true
        run: npm run test:e2e

      - name: Run dependency scans (advisory)
        continue-on-error: true
        run: |
          python -m pip install pip-audit
          pip-audit -r requirements.txt
          cd gui/frontend
          npm audit --audit-level=high

      - name: Generate CI summary
        if: always()
        run: |
          {
            echo "## Nightly Quality Summary"
            echo ""
            echo "- Workflow: nightly-quality"
            echo "- Timestamp (UTC): $(date -u +'%Y-%m-%d %H:%M:%S')"
            echo "- E2E run completed. See artifacts for details if failures occurred."
            echo "- Dependency audits executed in advisory mode."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-quality-artifacts
          path: |
            gui/frontend/playwright-report/
            gui/frontend/test-results/
            backend.log
            gui/frontend.log
          retention-days: 14

version: 2
updates:
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: UTC
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: pip
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '04:15'
      timezone: UTC
    labels:
      - dependencies
      - python

  - package-ecosystem: npm
    directory: '/gui/frontend'
    schedule:
      interval: weekly
      day: monday
      time: '04:30'
      timezone: UTC
    labels:
      - dependencies
      - frontend
